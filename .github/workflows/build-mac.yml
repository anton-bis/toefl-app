name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish to Release? (yes/no)'
        required: false
        default: 'no'
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npx cross-env ELECTRON=true npx vite build

      - name: Obfuscate
        run: node scripts/obfuscate.js

      - name: Build DMG
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: 托福模考系统-macOS-${{ github.ref_name }}
          path: release/*.dmg

      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
