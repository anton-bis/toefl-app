<!-- 导航栏组件 -->
<header class="exam-header">
  <div class="header-left">
    <div class="brand">toefl ibt</div>
  </div>
  <div class="header-center">
    <button class="nav-button back-btn" id="back-question-btn">
      <i class="fas fa-arrow-left"></i>
      <span>Back</span>
    </button>
    <button class="nav-button volume-btn">
      <span>Volume</span>
    </button>
    <button class="nav-button help-btn">
      <span>Help</span>
    </button>
    <button class="nav-button review-btn" id="review-btn">
      <span>Review</span>
      <i class="fas fa-flag"></i>
    </button>
    <button class="nav-button check-answers-btn" id="check-answers-btn">
      <span>Check Answers</span>
      <i class="fas fa-check-circle"></i>
    </button>
    <button class="nav-button next-btn" id="next-question-btn">
      <span>Next</span>
      <i class="fas fa-arrow-right"></i>
    </button>
  </div>
  <div class="header-right">
    <div class="timer-display-exam" id="timer-display-exam">00:11:30</div>
    <button class="hide-time-btn-exam" id="toggle-timer-exam-btn">
      <i class="fas fa-eye-slash"></i>
      <span>Hide Time</span>
    </button>
  </div>
</header>
